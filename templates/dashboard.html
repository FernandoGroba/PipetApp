<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PipetApp - Mis Mascotas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">
    <!-- ====== NAV ====== -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10"">
        <h1 class=" text-2xl font-bold text-indigo-600 italic">PipetApp 🐾</h1>
        <div class="flex items-center gap-4">
            <span class="text-slate-600 font-medium">Hola, <span class="text-indigo-600 font-bold">{{
                    session['username']
                    }}</span></span>
            <a href="/logout" class="text-sm text-red-500 hover:text-red-700 font-semibold">Salir</a>
        </div>
    </nav>

    <!-- ====== MAIN ====== -->
    <main class="max-w-6xl mx-auto p-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h2 class="text-3xl font-extrabold text-slate-800">Mis Mascotas</h2>
                <p class="text-slate-500">Gestioná la salud de tus compañeros</p>
            </div>
            <a href="/agregar_mascota"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-200 transition-all flex items-center gap-2">
                <span>+</span> Agregar Mascota
            </a>
        </div>

    </main>


</body>

</html>
