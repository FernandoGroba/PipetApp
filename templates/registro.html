<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PipetApp - Crear Cuenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-slate-200/60 p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-600 italic tracking-tight">PipetApp 🐾</h1>
            <p class="text-slate-500 mt-2 font-medium">Gestioná la salud de tus mascotas con un toque.</p>
        </div>

        <form action="/registro" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Nombre Completo</label>
                <input type="text" name="nombre" placeholder="Nombre" required
                    class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all placeholder:text-slate-400">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Correo Electrónico</label>
                <input type="email" name="email" placeholder="tu@email.com" required
                    class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all placeholder:text-slate-400">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required
                    class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all">
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98]">
                Crear cuenta gratis
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-100 pt-6">
            <p class="text-slate-600 text-sm">
                ¿Ya tienes una cuenta?
                <a href="/login" class="text-indigo-600 font-bold hover:text-indigo-800 transition-colors">Iniciá
                    sesión</a>
            </p>
        </div>
    </div>

</body>

</html>
