<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PipetApp - Nueva Mascota</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>


<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-xl p-8 border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">🐾 Nueva Mascota</h2>
        <form action="/agregar_mascota" method="POST" class="space-y-4">
            <input type="text" name="nombre" placeholder="Nombre (ej: Rocco)" required
                class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
            <select name="especie" class="w-full p-3 rounded-xl border border-slate-200 outline-none">
                <option value="Perro">Perro</option>
                <option value="Gato">Gato</option>
            </select>
            <input type="text" name="raza" placeholder="Raza"
                class="w-full p-3 rounded-xl border border-slate-200 outline-none">
            <input type="number" step="0.1" name="peso" placeholder="Peso (kg)" required
                class="w-full p-3 rounded-xl border border-slate-200 outline-none">
            <label class="block text-xs font-bold text-slate-400 ml-1">FECHA ÚLTIMA PIPETA</label>
            <input type="date" name="ultima_pipeta" required
                class="w-full p-3 rounded-xl border border-slate-200 outline-none">

            <button type="submit"
                class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all">Guardar</button>
            <a href="/dashboard" class="block text-center text-slate-400 text-sm mt-4 hover:underline">Cancelar</a>
        </form>
    </div>

</body>

</html>
